name: Build APK Direct

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Create Android Flutter project
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Add Android network permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
          ]
          for permission in permissions:
              if permission not in text:
                  text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission)
          manifest.write_text(text, encoding='utf-8')
          PY

      - name: Remove default test
        run: rm -rf test

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter APK
        run: flutter build apk --release

      - name: Build KitKat Java APK
        working-directory: android_kitkat_java
        run: gradle assembleDebug --no-daemon

      - name: Copy APK files
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/gameslocal-flutter.apk
          cp android_kitkat_java/app/build/outputs/apk/debug/app-debug.apk apk/gameslocal-kitkat.apk
          cat > DOWNLOAD_APK.md <<'EOF'
          # تحميل تطبيق ألعاب محلية

          يوجد ملفان APK:

          ## 1) نسخة الأجهزة الحديثة - Flutter
          تعمل للأجهزة الأحدث والأفضل أداءً:
          https://github.com/aljwaal1/gameslocal/raw/main/apk/gameslocal-flutter.apk

          ## 2) نسخة الأجهزة القديمة - Android 4.4 KitKat
          نسخة Java خفيفة مخصصة لـ Android 4.4:
          https://github.com/aljwaal1/gameslocal/raw/main/apk/gameslocal-kitkat.apk
          EOF

      - name: Commit APK files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build Flutter and KitKat APK files
          file_pattern: apk/gameslocal-flutter.apk apk/gameslocal-kitkat.apk DOWNLOAD_APK.md
