name: Build APK Direct

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Remove default test
        run: rm -rf test

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release

      - name: Copy APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/gameslocal.apk
          echo "https://github.com/aljwaal1/gameslocal/raw/main/apk/gameslocal.apk" > DOWNLOAD_APK.md

      - name: Commit APK
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build gameslocal APK
          file_pattern: apk/gameslocal.apk DOWNLOAD_APK.md
