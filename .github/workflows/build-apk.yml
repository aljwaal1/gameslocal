name: Build APK Direct

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'test/**'
      - 'pubspec.yaml'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gameslocal-modern-flutter
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable


      - name: Create Android Flutter project
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Add Android network permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
          ]
          for permission in permissions:
              if permission not in text:
                  text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission)
          manifest.write_text(text, encoding='utf-8')
          PY

      - name: Remove generated sample test
        run: rm -f test/widget_test.dart

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test

      - name: Analyze Flutter
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Flutter APK
        run: flutter build apk --release


      - name: Copy APK files
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p apk/modern
          cp build/app/outputs/flutter-apk/app-release.apk apk/modern/gameslocal-flutter.apk
          cat > DOWNLOAD_APK.md <<'EOF'
          # تحميل تطبيق ألعاب محلية

          يوجد ملفان APK:

          ## 1) نسخة الأجهزة الحديثة - Flutter
          تعمل للأجهزة الأحدث والأفضل أداءً:
          https://github.com/aljwaal1/gameslocal/raw/main/apk/modern/gameslocal-flutter.apk
          EOF

      - name: Commit APK files
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build modern Flutter APK
          file_pattern: apk/modern/gameslocal-flutter.apk DOWNLOAD_APK.md
